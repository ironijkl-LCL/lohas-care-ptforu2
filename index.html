        .dot.active { background: #e67e22; transform: scale(1.15); box-shadow: 0 0 8px rgba(230,126,34,0.5); }
        .dot.completed { background: #2980b9; }

        .main-layout {
            display: flex;
            flex-direction: row;
            gap: 15px;
            max-width: 1200px;
            width: 100%;
            justify-content: center;
        }

        .video-box {
            position: relative;
            width: 500px;
            height: 390px;

            border-radius: 12px;
            overflow: hidden;

        #webcam, #output_canvas {

        .demo-box {
            width: 300px; height: 390px; background-color: #ffffff;

        .control-panel {
            width: 350px; background-color: #ffffff; border-radius: 12px;
            padding: 15px; box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .status-badge {
            background-color: #e8f4fd; color: #2980b9; padding: 8px;
            border-radius: 6px; font-weight: bold; font-size: 16px; text-align: center;
        }
        .benefit-badge {
            background-color: #e8f8f5; color: #117a65; padding: 6px; font-size: 12px;

        .instruction-card {
            background-color: #fdf6e2; border-left: 5px solid #f39c12;
            padding: 12px; border-radius: 4px; margin: 10px 0; min-height: 90px;
            transition: background-color 0.3s;
        }
        .instruction-card.rest-mode {

        }
        .instruction-card h3 { margin: 0 0 5px 0; color: #d35400; font-size: 14px; }

        .instruction-card p { margin: 0; font-size: 14px; line-height: 1.4; font-weight: bold; color: #2c3e50; white-space: pre-line; }

        .metric-item { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; }
        .metric-value { font-weight: bold; color: #e74c3c; }
        
        .progress-container { background-color: #ecf0f1; border-radius: 10px; height: 14px; overflow: hidden; margin-top: 5px; }
        .progress-bar { background-color: #2ecc71; height: 100%; width: 0%; transition: width 0.1s linear; }
        .loading-tag { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; z-index: 100; }

        .skeleton-part { transition: none; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); box-shadow: 0 0 12px rgba(230,126,34,0.6); }
            100% { transform: scale(1); }
        }
    </style>

    <script>
        // --- 🌟 輕快舒服、節奏分明的 Lo-Fi 電子爵士樂生成引擎 ---
        let audioCtx = null; let musicSeqId = null; let beatCount = 0;
        const CHORDS = [
            { bass: 73.42, Arpeggio: [146.83, 220.00, 293.66, 440.00] }, 
            { bass: 87.31, Arpeggio: [164.81, 220.00, 329.63, 440.00] }, 
            { bass: 98.00, Arpeggio: [196.00, 293.66, 392.00, 587.33] }  
        ];

        function initAudioSystem() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const tempoInterval = 272; // 穩定的樂曲律動節拍
            
            function playNextBeat() {
                const now = audioCtx.currentTime;
                const chordIdx = Math.floor(beatCount / 16) % CHORDS.length;
                const currentChord = CHORDS[chordIdx];

                // 爵士低音 Bass 演奏（每 4 拍一聲，平穩舒服）
                if (beatCount % 4 === 0) {
                    let bassOsc = audioCtx.createOscillator(); let bassGain = audioCtx.createGain();
                    bassOsc.type = 'triangle'; bassOsc.frequency.setValueAtTime(currentChord.bass, now);
                    bassGain.gain.setValueAtTime(0.25, now); bassGain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
                    bassOsc.connect(bassGain); bassGain.connect(audioCtx.destination); bassOsc.start(now); bassOsc.stop(now + 0.6);
                }

                // 清脆動聽的五聲音階旋律流淌
                if (beatCount % 2 === 0 || Math.random() > 0.6) {
                    let melOsc = audioCtx.createOscillator(); let melGain = audioCtx.createGain();
                    let note = currentChord.Arpeggio[Math.floor(Math.random() * currentChord.Arpeggio.length)];
                    melOsc.type = 'sine'; melOsc.frequency.setValueAtTime(note, now);
                    melGain.gain.setValueAtTime(0.05, now); melGain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    melOsc.connect(melGain); melGain.connect(audioCtx.destination); melOsc.start(now); melOsc.stop(now + 0.4);
                }

                // 輕快穩定的沙錘與爵士鼓點模擬 (Hi-Hat / Shaker)
                if (beatCount % 2 === 0) {
                    let noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.04, audioCtx.sampleRate);
                    let output = noiseBuffer.getChannelData(0);
                    for (let i = 0; i < noiseBuffer.length; i++) output[i] = Math.random() * 2 - 1;
                    let whiteNoise = audioCtx.createBufferSource(); whiteNoise.buffer = noiseBuffer;
                    let noiseGain = audioCtx.createGain(); noiseGain.gain.setValueAtTime(0.015, now);
                    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
                    whiteNoise.connect(noiseGain); noiseGain.connect(audioCtx.destination); whiteNoise.start(now);
                }

                beatCount++; musicSeqId = setTimeout(playNextBeat, tempoInterval);
            }
            playNextBeat();

            const audioBtn = document.getElementById('audio-init-btn');
            audioBtn.innerText = "🎵 背景音樂伴奏中"; audioBtn.style.backgroundColor = "#2980b9"; audioBtn.style.animation = "none";
        }

        // 重複滿 3 次過渡時播放的爵士大三和弦掃弦通關樂章
        function playPerfectPassGroove() {
            if (!audioCtx) return; const now = audioCtx.currentTime;
            [293.66, 369.99, 440.00, 587.33].forEach((freq, idx) => {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now + (idx * 0.05));
                gain.gain.setValueAtTime(0.12, now + (idx * 0.05)); gain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now + (idx * 0.05)); osc.stop(now + 1.0);
            });
        }

        // 🌟 移除原先刺耳的電子合成音，將計時進度回饋交給背景音樂的流暢律動
        function playHoldTickSound(p) {
            // 已根據要求剔除水滴粒子音，由畫面與音樂自然配合
        }

        // --- 核心動態示範數學插值與雙圖層骨骼引擎 ---
        let animFrameId = null; let animTime = 0; let globalDemoTargetPose = null; 
        function lerp(start, end, amt){ return (1 - amt) * start + amt * end; }

        function startDemoAnimation(initFrameFn, targetFrameFn) {
            if(animFrameId) cancelAnimationFrame(animFrameId);
            animTime = 0;

            function renderLoop() {
                animTime += 0.02; 
                let t = (Math.sin(animTime - Math.PI / 2) + 1) / 2; 

                const startPose = initFrameFn ? initFrameFn() : { arm:[75,120,70,165,125,120,130,165], leg:[80,210,75,270,120,210,125,270], body:[100,50,100,100,160] };
                const endPose = targetFrameFn ? targetFrameFn() : startPose;

                let currentArm = {
                    x11: lerp(startPose.arm[0], endPose.arm[0], t), y11: lerp(startPose.arm[1], endPose.arm[1], t),
                    x12: lerp(startPose.arm[2], endPose.arm[2], t), y12: lerp(startPose.arm[3], endPose.arm[3], t),
                    x21: lerp(startPose.arm[4], endPose.arm[4], t), y21: lerp(startPose.arm[5], endPose.arm[5], t),
                    x22: lerp(startPose.arm[6], endPose.arm[6], t), y22: lerp(startPose.arm[7], endPose.arm[7], t)
                };
                let currentLeg = {
                    x11: lerp(startPose.leg[0], endPose.leg[0], t), y11: lerp(startPose.leg[1], endPose.leg[1], t),
                    x12: lerp(startPose.leg[2], endPose.leg[2], t), y12: lerp(startPose.leg[3], endPose.leg[3], t),
                    x21: lerp(startPose.leg[4], endPose.leg[4], t), y21: lerp(startPose.leg[5], endPose.leg[5], t),
                    x22: lerp(startPose.leg[6], endPose.leg[6], t), y22: lerp(startPose.leg[7], endPose.leg[7], t)
                };
                let currentBody = {
                    hx: lerp(startPose.body[0], endPose.body[0], t), hy: lerp(startPose.body[1], endPose.body[1], t),
                    bx1: lerp(startPose.body[2], endPose.body[2], t), bx2: lerp(startPose.body[3], endPose.body[3], t), by2: lerp(startPose.body[4], endPose.body[4], t)
                };

                // 🌟 將動態公仔的即時坐標轉換快照至全新 7 點標準化矩陣 (頭 + 上身4點 + 下身2點)
                globalDemoTargetPose = {
                    head:          { x: currentBody.hx/200, y: currentBody.hy/290 }, // 1. 頭部
                    leftShoulder:  { x: currentArm.x11/200, y: currentArm.y11/290 }, // 2. 左肩
                    rightShoulder: { x: currentArm.x21/200, y: currentArm.y21/290 }, // 3. 右肩
                    leftWrist:     { x: currentArm.x12/200, y: currentArm.y12/290 }, // 4. 左手腕
                    rightWrist:    { x: currentArm.x22/200, y: currentArm.y22/290 }, // 5. 右手腕
                    leftHip:       { x: currentLeg.x11/200, y: currentLeg.y11/290 },  // 6. 左髖
                    rightHip:      { x: currentLeg.x21/200, y: currentLeg.y21/290 }   // 7. 右髖
                };

                applyHybridGrownCoach(currentArm, currentLeg, currentBody);
                animFrameId = requestAnimationFrame(renderLoop);
            }
            renderLoop();
        }

        function applyHybridGrownCoach(arm, leg, body) {
            // LAYER 1: 太極寬鬆衣服裝與鞋帽色塊圖層
            document.getElementById('cloth-l-arm1').setAttribute("x2", arm.x11); document.getElementById('cloth-l-arm1').setAttribute("y2", arm.y11);
            document.getElementById('cloth-l-arm2').setAttribute("x1", arm.x11); document.getElementById('cloth-l-arm2').setAttribute("y1", arm.y11);
            document.getElementById('cloth-l-arm2').setAttribute("x2", arm.x12); document.getElementById('cloth-l-arm2').setAttribute("y2", arm.y12);
            document.getElementById('cloth-r-arm1').setAttribute("x2", arm.x21); document.getElementById('cloth-r-arm1').setAttribute("y2", arm.y21);
            document.getElementById('cloth-r-arm2').setAttribute("x1", arm.x21); document.getElementById('cloth-r-arm2').setAttribute("y1", arm.y21);
            document.getElementById('cloth-r-arm2').setAttribute("x2", arm.x22); document.getElementById('cloth-r-arm2').setAttribute("y2", arm.y22);

            document.getElementById('cloth-l-hand').setAttribute("cx", arm.x12); document.getElementById('cloth-l-hand').setAttribute("cy", arm.y12);
            document.getElementById('cloth-r-hand').setAttribute("cx", arm.x22); document.getElementById('cloth-r-hand').setAttribute("cy", arm.y22);

            document.getElementById('cloth-l-leg1').setAttribute("x2", leg.x11); document.getElementById('cloth-l-leg1').setAttribute("y2", leg.y21);
            document.getElementById('cloth-l-leg2').setAttribute("x1", leg.x11); document.getElementById('cloth-l-leg2').setAttribute("y1", leg.y21);
            document.getElementById('cloth-l-leg2').setAttribute("x2", leg.x12); document.getElementById('cloth-l-leg2').setAttribute("y2", leg.y12);
            document.getElementById('cloth-r-leg1').setAttribute("x2", leg.x21); document.getElementById('cloth-r-leg1').setAttribute("y2", leg.y21);
            document.getElementById('cloth-r-leg2').setAttribute("x1", leg.x21); document.getElementById('cloth-r-leg2').setAttribute("y1", leg.y21);
            document.getElementById('cloth-r-leg2').setAttribute("x2", leg.x22); document.getElementById('cloth-r-leg2').setAttribute("y2", leg.y22);

        // --- 🌟 全新指定：上身 4 點 ＋ 下身 2 點 ＋ 頭部（共 7 點精準幾何位置對位引擎） ---
        function verify7PointsMatrix(userPoints, demoTarget) {
            if (!demoTarget || !userPoints) return { passedCount: 0, symmetryScore: 0 };

            // 建立幾何歸一化自適應比例尺（完美消除用家與相機站立距離遠近的誤差）
            const uShoulderWidth = Math.abs(userPoints[11].x - userPoints[12].x) || 0.15;
            const uTorsoHeight = Math.abs(userPoints[11].y - userPoints[23].y) || 0.3;

            // 🎯 完全契合指定的 7 點復康核心矩陣映射清單
            const pointsList = [
                { name: "head",          id: 0  }, // 1. 頭部 (MediaPipe Nose 點為中央鼻尖)
                { name: "leftShoulder",  id: 11 }, { name: "rightShoulder", id: 12 }, // 2 & 3. 上身肩 2 點
                { name: "leftWrist",     id: 15 }, { name: "rightWrist",    id: 16 }, // 4 & 5. 上身手腕 2 點
                { name: "leftHip",       id: 23 }, { name: "rightHip",      id: 24 }  // 6 & 7. 下身髖部 2 點
            ];

            let passedCount = 0; let totalError = 0;

            pointsList.forEach(pt => {
                const uPt = userPoints[pt.id]; const dPt = demoTarget[pt.name];
                if (uPt && dPt) {
                    const errorX = Math.abs((uPt.x - userPoints[11].x) / uShoulderWidth - (dPt.x - 0.5) * 2);
                    const errorY = Math.abs((uPt.y - userPoints[11].y) / uTorsoHeight - (dPt.y - 0.2) * 3);
                    totalError += (errorX + errorY);
                    
                    // 寬容到位判定：相對幾何誤差在 0.31 內即算合格到位（兼顧物理治療精準度與居家大容錯）
                    if (errorX < 0.31 && errorY < 0.31) passedCount++;
                }
            });

            // 計算身體中正中軸平衡度
            let symmetryScore = Math.max(0, Math.round(100 - (totalError * 8.5)));
            if (symmetryScore > 100) symmetryScore = 100;

            return { passedCount, symmetryScore };
        }

            const canvasElement = document.getElementById('output_canvas'); const canvasCtx = canvasElement.getContext('2d');

            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // 🌟 核心防閃退隔離安全開關：休整過渡期完全斷開演算法運算，杜絕異步混亂卡死
            if (gameState === "REST_LOCK" || !results.poseLandmarks) {
                if (results.poseLandmarks) {
                    drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, { color: '#00FF00', lineWidth: 4 });
                    drawLandmarks(canvasCtx, results.poseLandmarks, { color: '#FF0000', lineWidth: 1, radius: 3 });
                }
                canvasCtx.restore(); return;
            }

            const landmarks = results.poseLandmarks;
            drawConnectors(canvasCtx, landmarks, POSE_CONNECTIONS, { color: '#00FF00', lineWidth: 4 });
            drawLandmarks(canvasCtx, landmarks, { color: '#FF0000', lineWidth: 1, radius: 3 });

            // 執行全新的「頭、上身4點、下身2點（共7點）」精準對位比對
            const { passedCount, symmetryScore } = verify7PointsMatrix(landmarks, globalDemoTargetPose);

            document.getElementById('val-a').innerText = `${passedCount} / 7 點到位`;
            document.getElementById('val-b').innerText = `${symmetryScore}% 重合`;

            // 🌟 到位觸發門檻：指定的 7 大核心點中有 5 點以上重合到位，即算動作擺好，音遊長按蓄力條啟動！

                if (!isHolding) { isHolding = true; holdStartTime = Date.now(); }

                document.getElementById('target-count').innerText = `第 ${currentRepetition} 次 (${(elapsed/1000).toFixed(1)}s)`;

                if (elapsed >= requiredHoldTime) {
                    isHolding = false; document.getElementById('action-progress').style.width = "0%";

                        document.getElementById('target-count').innerText = `已完成 3 / 3 次！`;
                        document.getElementById('target-count').style.color = '#27ae60';

                        // 變更為隔離休整狀態，斷開影像判定

                        // 切換卡片樣式為亮綠色通關休整模式
                        const card = document.getElementById('target-card'); card.classList.add('rest-mode');
                        document.getElementById('card-header').innerText = "🎉 正確！指定 7 點已做滿 3 次";
                        document.getElementById('instruction-text').innerText = "做得非常好！本組微動作已精準達標。\n【請完全停下休息、放鬆還原姿勢】\n3 秒後將為你自動安全切換至下一招。";

                        // 🌟 防閃退核心：將加載邏輯包裹在 setTimeout，在主線程完全靜止的安全環境下異步切關
                        setTimeout(() => {
                            if (currentGlobalIdx < 31) {
                                loadStep(currentGlobalIdx + 1);
                            } else {
                                document.getElementById('instruction-text').innerText = "🎉 完美功成！全套八段錦 32 招微動作精準定位全部圓滿！";
                                document.getElementById('target-count').innerText = "全功圓滿！";
                            }
                        }, 3500);
                    }
                }
            } else {
                if (!isHolding) {
                    document.getElementById('val-a').style.color = '#e74c3c'; document.getElementById('val-b').style.color = '#e74c3c';
                    document.getElementById('action-progress').style.width = "0%";
                }
            }
            canvasCtx.restore();
        }

        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        pose.onResults(onResults);
        
        const videoElement = document.getElementById('webcam');
        const camera = new Camera(videoElement, { onFrame: async () => { await pose.send({ image: videoElement }); }, width: 500, height: 390 });
        camera.start();

        window.onload = () => { buildDots(); loadStep(0); };
    </script>
</body>
</html>
