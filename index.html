    <style>
        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #2c3e50;
        }

        h1 { margin-bottom: 5px; font-size: 26px; color: #2c3e50; }
        .subtitle { color: #7f8c8d; margin-bottom: 15px; font-size: 15px; }

        .stage-selector {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 1200px;
            align-items: center;
            background: #fff;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .nav-row { display: flex; gap: 10px; justify-content: center; width: 100%; align-items: center; }
        .ctrl-btn {
            background-color: #27ae60; color: white; border: none; padding: 10px 20px;
            font-size: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.3s;
        }
        .ctrl-btn:hover { opacity: 0.9; }
        
        .audio-toggle-btn { background-color: #e67e22; animation: pulse 2s infinite; }

        .step-dots { display: flex; gap: 8px; margin-top: 5px; overflow-x: auto; max-width: 100%; padding: 5px; }
        .dot {
            width: 28px; height: 28px; border-radius: 50%; background: #bdc3c7; color: white;
            display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold;
            cursor: pointer; transition: all 0.3s; flex-shrink: 0;
        }
        .dot.active { background: #e67e22; transform: scale(1.15); box-shadow: 0 0 8px rgba(230,126,34,0.5); }
        .dot.completed { background: #2980b9; }

        .main-layout {
            display: flex;
            flex-direction: row;
            gap: 15px;
            max-width: 1200px;
            width: 100%;
            justify-content: center;
        }

        .video-box {
            position: relative;
            width: 500px;
            height: 390px;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }
        #webcam, #output_canvas {
            position: absolute; left: 0; top: 0; width: 500px; height: 390px;
            transform: rotateY(180deg); object-fit: cover;
        }

        .demo-box {
            width: 300px; height: 390px; background-color: #ffffff;
            border-radius: 12px; box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 10px; box-sizing: border-box;
            border: 2px dashed #2980b9;
        }
        .demo-title { font-weight: bold; color: #e67e22; margin-bottom: 5px; font-size: 14px; text-align: center; }

        .control-panel {
            width: 350px; background-color: #ffffff; border-radius: 12px;
            padding: 15px; box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .status-badge {
            background-color: #e8f4fd; color: #2980b9; padding: 8px;
            border-radius: 6px; font-weight: bold; font-size: 16px; text-align: center;
        }
        .benefit-badge {
            background-color: #e8f8f5; color: #117a65; padding: 6px; font-size: 12px;
            border-radius: 4px; margin-top: 5px; font-weight: bold;

        .instruction-card {
            background-color: #fdf6e2; border-left: 5px solid #f39c12;

        .instruction-card h3 { margin: 0 0 5px 0; color: #d35400; font-size: 14px; }
        .instruction-card p { margin: 0; font-size: 14px; line-height: 1.4; font-weight: bold; color: #2c3e50; white-space: pre-line; }

        .metric-item { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; }
        .metric-value { font-weight: bold; color: #e74c3c; }
        
        .progress-container { background-color: #ecf0f1; border-radius: 10px; height: 14px; overflow: hidden; margin-top: 5px; }
        .progress-bar { background-color: #2ecc71; height: 100%; width: 0%; transition: width 0.1s linear; }
        .loading-tag { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; z-index: 100; }

        .skeleton-part { transition: none; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); box-shadow: 0 0 12px rgba(230,126,34,0.6); }
            100% { transform: scale(1); }
        }

    <script>
        // --- AUDIO ENGINE ---
        let audioCtx = null; let bgmOscillator = null; let bgmGain = null;
        function initAudioSystem() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            bgmGain = audioCtx.createGain(); bgmGain.gain.setValueAtTime(0.06, audioCtx.currentTime); bgmGain.connect(audioCtx.destination);
            bgmOscillator = audioCtx.createOscillator(); bgmOscillator.type = 'triangle'; bgmOscillator.frequency.setValueAtTime(146.83, audioCtx.currentTime); bgmOscillator.connect(bgmGain); bgmOscillator.start();
            const audioBtn = document.getElementById('audio-init-btn'); audioBtn.innerText = "🎵 音樂播音中"; audioBtn.style.backgroundColor = "#2980b9"; audioBtn.style.animation = "none";
        }
        function playHoldTickSound(p) {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(400 + (p * 4), audioCtx.currentTime);
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }
        function playPerfectBellSound() {
            if (!audioCtx) return; const now = audioCtx.currentTime;
            [523.25, 783.99, 1046.50].forEach((f, idx) => {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(f, now);
                gain.gain.setValueAtTime(idx === 0 ? 0.2 : 0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(now + 1.2);
            });
        }

        // --- 核心動態示範數學插值引擎 ---
        let animFrameId = null; let animTime = 0;
        function lerp(start, end, amt){ return (1 - amt) * start + amt * end; }

        function startDemoAnimation(initFrameFn, targetFrameFn) {
            if(animFrameId) cancelAnimationFrame(animFrameId);
            animTime = 0;

            function renderLoop() {
                animTime += 0.02; 
                let t = (Math.sin(animTime - Math.PI / 2) + 1) / 2; 

                // 加上防呆防呆保護，避免資料格式未讀取時出錯
                const startPose = initFrameFn ? initFrameFn() : { arm:[75,120,70,165,125,120,130,165], leg:[80,210,75,270,120,210,125,270], body:[100,50,100,100,160] };
                const endPose = targetFrameFn ? targetFrameFn() : startPose;

                let currentArm = {
                    x11: lerp(startPose.arm[0], endPose.arm[0], t), y11: lerp(startPose.arm[1], endPose.arm[1], t),
                    x12: lerp(startPose.arm[2], endPose.arm[2], t), y12: lerp(startPose.arm[3], endPose.arm[3], t),
                    x21: lerp(startPose.arm[4], endPose.arm[4], t), y21: lerp(startPose.arm[5], endPose.arm[5], t),
                    x22: lerp(startPose.arm[6], endPose.arm[6], t), y22: lerp(startPose.arm[7], endPose.arm[7], t)
                };
                let currentLeg = {
                    x11: lerp(startPose.leg[0], endPose.leg[0], t), y11: lerp(startPose.leg[1], endPose.leg[1], t),
                    x12: lerp(startPose.leg[2], endPose.leg[2], t), y12: lerp(startPose.leg[3], endPose.leg[3], t),
                    x21: lerp(startPose.leg[4], endPose.leg[4], t), y21: lerp(startPose.leg[5], endPose.leg[5], t),
                    x22: lerp(startPose.leg[6], endPose.leg[6], t), y22: lerp(startPose.leg[7], endPose.leg[7], t)
                };
                let currentBody = {
                    hx: lerp(startPose.body[0], endPose.body[0], t), hy: lerp(startPose.body[1], endPose.body[1], t),
                    bx1: lerp(startPose.body[2], endPose.body[2], t), bx2: lerp(startPose.body[3], endPose.body[3], t), by2: lerp(startPose.body[4], endPose.body[4], t)
                };

                applyArmPoints(currentArm);
                applyLegPoints(currentLeg);
                applyBodyPoints(currentBody);

                animFrameId = requestAnimationFrame(renderLoop);
            }
            renderLoop();
        }

        function applyArmPoints(p) {
            document.getElementById('demo-left-arm1').setAttribute("x2", p.x11); document.getElementById('demo-left-arm1').setAttribute("y2", p.y11);
            document.getElementById('demo-left-arm2').setAttribute("x1", p.x11); document.getElementById('demo-left-arm2').setAttribute("y1", p.y11);
            document.getElementById('demo-left-arm2').setAttribute("x2", p.x12); document.getElementById('demo-left-arm2').setAttribute("y2", p.y12);
            document.getElementById('demo-right-arm1').setAttribute("x2", p.x21); document.getElementById('demo-right-arm1').setAttribute("y2", p.y21);
            document.getElementById('demo-right-arm2').setAttribute("x1", p.x21); document.getElementById('demo-right-arm2').setAttribute("y1", p.y21);
            document.getElementById('demo-right-arm2').setAttribute("x2", p.x22); document.getElementById('demo-right-arm2').setAttribute("y2", p.y22);
        }
        function applyLegPoints(p) {
            document.getElementById('demo-l-leg1').setAttribute("x2", p.x11); document.getElementById('demo-l-leg1').setAttribute("y2", p.y11);
            document.getElementById('demo-l-leg2').setAttribute("x1", p.x11); document.getElementById('demo-l-leg2').setAttribute("y1", p.y11);
            document.getElementById('demo-l-leg2').setAttribute("x2", p.x12); document.getElementById('demo-l-leg2').setAttribute("y2", p.y12);
            document.getElementById('demo-r-leg1').setAttribute("x2", p.x21); document.getElementById('demo-r-leg1').setAttribute("y2", p.y21);
            document.getElementById('demo-r-leg2').setAttribute("x1", p.x21); document.getElementById('demo-r-leg2').setAttribute("y1", p.y21);
            document.getElementById('demo-r-leg2').setAttribute("x2", p.x22); document.getElementById('demo-r-leg2').setAttribute("y2", p.y22);
        }
        function applyBodyPoints(p) {
            document.getElementById('demo-head').setAttribute("cx", p.hx); document.getElementById('demo-head').setAttribute("cy", p.hy);
            document.getElementById('demo-body').setAttribute("x1", p.bx1); document.getElementById('demo-body').setAttribute("x2", p.bx2); document.getElementById('demo-body').setAttribute("y2", p.by2);
        }

                     init: () => ({ arm:[70,120,65,165, 130,120,135,165], leg:BASE_LEG, body:BASE_BODY }),

                     init: () => ({ arm:[85,110,100,120, 115,110,100,120], leg:BASE_LEG, body:BASE_BODY }),
                     target: () => ({ arm:[80,70,75,30, 120,70,125,30], leg:BASE_LEG, body:BASE_BODY })},
                    {口訣:"提踵仰頭望手背", 動作:"手臂儘量打直，抬頭看手背，腳後跟微提。", 指標A:"仰頭/提踵狀態", 指標B:"手肘高舉程度", 提示:"長者友善判定：手肘高舉微曲(>130°)即可解鎖通關！",
                     init: () => ({ arm:[80,70,75,30, 120,70,125,30], leg:BASE_LEG, body:BASE_BODY }),
                     target: () => ({ arm:[80,40,80,5, 120,40,120,5], leg:[80,200,75,260, 120,200,125,260], body:[100,45,100,100,150] })},
                    {口訣:"調理三焦氣機通", 動作:"雙手分開，從兩側緩緩劃圈落下還原。", 指標A:"手腕橫向外展", 指標B:"雙手降回兩側", 提示:"雙臂向身體兩側弧形垂下。",

                     init: () => ({ arm:BASE_ARM, leg:BASE_LEG, body:BASE_BODY }),

                     init: () => ({ arm:[85,100,75,120, 115,100,125,120], leg:[70,210,50,270, 130,210,150,270], body:[100,60,100,100,150] }),
                     target: () => ({ arm:[50,90,10,90, 120,90,145,115], leg:[70,210,50,270, 130,210,150,270], body:[100,60,100,100,150] })},
                    {口訣:"眼神凝視遠方處", 動作:"保持馬步拉弓，定格，眼神堅定凝視左手前方。", 指標A:"擴胸對稱與穩定", 指標B:"左肘舒展水平", 提示:"穩住姿勢，眼睛看左方公仔指引。",
                     init: () => ({ arm:[50,90,10,90, 120,90,145,115], leg:[70,210,50,270, 130,210,150,270], body:[100,60,100,100,150] }),

        ];

        const EXT_DATA = [
            { title:"第三式：調理脾胃須單舉", benefit:"牽動腹腔，按摩脾胃。", steps:[{k:"一手頂天一手按",d:"左手翻掌上舉，右手下按雙向對沖。"},{k:"指尖對應力對沖",d:"雙掌用力對拉，左手肘儘量挺直。"},{k:"右升左降交替練",d:"雙手交替在胸前抱球過渡，準備換邊。"},{k:"調理脾胃效無窮",d:"換右手一側上舉，左手下按動作。"}] },
            { title:"第四式：五勞七傷往後瞧", benefit:"放鬆頸椎，舒緩雙肩疲勞。", steps:[{k:"轉頭扭頸後方瞧",d:"身體直立，頭緩緩向左後方轉動眼看後方。"},{k:"轉臂旋腕莫動搖",d:"雙臂向外旋轉，拉開肩胸經絡。"},{k:"舒緩經絡除疲勞",d:"保持向後瞧姿勢定格，深度呼吸放鬆。"},{k:"五勞七傷一併消",d:"頭部與雙臂旋回前方，上身正中放鬆。"}] },
            { title:"第五式：搖頭擺尾去心火", benefit:"活動脊椎下引心火。", steps:[{k:"馬步寬大雙手按",d:"邁大馬步下蹲，雙手虎口扶在膝蓋上。"},{k:"搖頭晃身尾閭擺",d:"身體前傾，頭向左前方搖晃微旋。"},{k:"降火滋陰通經脈",d:"臀部尾閭向右擺，脊椎流暢扭動. 。"},{k:"心清氣爽身自在",d:"起立回正，雙腳收回恢復基本站姿。"}] },
            { title:"第六式：兩手攀足固腎腰", benefit:"強壯腰膝、固攝腎氣。", steps:[{k:"雙手反拉貼背下",d:"雙手高舉後貼著後背臀部向下摩運。"},{k:"沿腿向下攀足尖",d:"前屈折疊，雙手順大腿後側向下攀足尖。"},{k:"挺胸直脊引氣血",d:"雙手攀足尖，雙腿保持直立拉伸。"},{k:"固腎壯腰身手健",d:"緩緩直立起身，恢復正中站姿。"}] },
            { title:"第七式：攢拳怒目增氣力", benefit:"舒肝理氣、增長金剛力。", steps:[{k:"馬步穩扎出拳快",d:"扎穩馬步，左拳向前緩緩猛烈衝出。"},{k:"瞪眼怒目氣力增",d:"雙眼睜大，怒目凝視前方。"},{k:"抓握有力收拳穩",d:"左手變掌抓拳收回，換右拳衝出. 。"},{k:"疏肝理氣顯神威",d:"收拳起立回正，全身放鬆。"}] },
            { title:"第八式：背後七顛百病消", benefit:"震盪脊椎，消除百病。", steps:[{k:"腳跟提起莫動搖",d:"雙腳併攏，腳後跟緩緩提起提起抬高。"},{k:"百會上頂全身高",d:"百會穴上頂保持筆直平衡。"},{k:"輕輕落地震一下",d:"腳跟放鬆落地，使身體受到微小震動。"},{k:"全身放鬆百病消",d:"雙手重歸身側，放鬆收功。"}] }
        ];

        // 扁平化整合
        RAW_DATA.forEach((item, sIdx) => {
            item.steps.forEach((st, stepIdx) => {
                ALL_32_STEPS.push({
                    globalIdx: ALL_32_STEPS.length, mainTitle: item.title, benefit: item.benefit,
                    badge: `第 ${sIdx+1} 式：微動作 ${stepIdx+1}/4`, desc: `【口訣】${st.口訣}\n【要領】${st.動作}`,
                    lblA: st.指標A, lblB: st.指標B, help: st.提示, init: st.init, target: st.target, mainIdx: sIdx, subIdx: stepIdx
                });
            });
        });

        EXT_DATA.forEach((item, sIdx) => {
            const realIdx = sIdx + 2;
            item.steps.forEach((st, stepIdx) => {
                ALL_32_STEPS.push({
                    globalIdx: ALL_32_STEPS.length, mainTitle: item.title, benefit: item.benefit,
                    badge: `第 ${realIdx+1} 式：微動作 ${stepIdx+1}/4`, desc: `【口訣】${st.k}\n【要領】${st.d}`,
                    lblA: "左側關節高度", lblB: "右側關節高度", help: "高容錯保底：跟隨公仔動態節奏舒展即可解鎖！",
                    init: () => ({ arm: BASE_ARM, leg: BASE_LEG, body: BASE_BODY }),
                    target: () => {
                        let armTemp = [...BASE_ARM];
                        if(stepIdx === 0) armTemp = [75,80,65,40, 125,120,130,165];
                        if(stepIdx === 1) armTemp = [75,40,70,5, 125,45,120,5];
                        if(stepIdx === 2) armTemp = [60,90,40,110, 140,90,160,110];
                        return { arm: armTemp, leg: BASE_LEG, body: BASE_BODY };
                    },
                    mainIdx: realIdx, subIdx: stepIdx
                });
            });
        });

        function buildDots() {
            const container = document.getElementById('dots-container');
            if(!container) return;
            container.innerHTML = "";
            for(let i=0; i<32; i++) {
                let d = document.createElement('div');
                d.className = "dot"; d.id = `dot-${i}`; d.innerText = i + 1; d.onclick = () => loadStep(i); container.appendChild(d);
            }
        }

        function loadStep(gIdx) {
            if (gIdx < 0 || gIdx >= ALL_32_STEPS.length) return;
            currentGlobalIdx = gIdx; isHolding = false;
            
            const progressText = document.getElementById('global-progress-text');
            if(progressText) progressText.innerText = `關卡進度: ${gIdx + 1} / 32`;
            
            const progressBar = document.getElementById('action-progress');
            if(progressBar) progressBar.style.width = "0%";
            
            const cfg = ALL_32_STEPS[gIdx];
            document.getElementById('main-badge').innerText = cfg.mainTitle + " (" + cfg.badge + ")";
            document.getElementById('benefit-text').innerText = "好處：" + cfg.benefit;
            document.getElementById('instruction-text').innerText = cfg.desc;
            document.getElementById('lbl-a').innerText = cfg.lblA; 
            document.getElementById('lbl-b').innerText = cfg.lblB;
            document.getElementById('help-desc').innerText = "動作對齊指南：" + cfg.help;
            document.getElementById('target-count').innerText = `0 / 1.5 秒`;

            for (let i = 0; i < 32; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if(dot) { dot.className = "dot"; if (i === gIdx) dot.classList.add("active"); if (i < gIdx) dot.classList.add("completed"); }
            }
            startDemoAnimation(cfg.init, cfg.target);
        }

        function jumpStep(dir) { let n = currentGlobalIdx + dir; if (n >= 0 && n < 32) loadStep(n); }
        function calculateAngle(p1, p2, p3) {
            if(!p1 || !p2 || !p3) return 0;
            let radians = Math.atan2(p3.y - p2.y, p3.x - p2.x) - Math.atan2(p1.y - p2.y, p1.x - p2.x);
            let angle = Math.abs((radians * 180.0) / Math.PI); if (angle > 180.0) angle = 360 - angle; return angle;
        }

        // --- AI 運動捕捉引擎 ---
        let currentGlobalIdx = 0;
        let isHolding = false;
        let holdStartTime = 0;
        const requiredHoldTime = 1500; 

        function onResults(results) {
            const loadingTag = document.getElementById('loading');
            if (loadingTag) loadingTag.style.display = 'none';
            
            const canvasElement = document.getElementById('output_canvas');
            const canvasCtx = canvasElement.getContext('2d');
            canvasCtx.save(); canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, { color: '#00FF00', lineWidth: 4 });
                drawLandmarks(canvasCtx, results.poseLandmarks, { color: '#FF0000', lineWidth: 1, radius: 3 });

                const landmarks = results.poseLandmarks;
                const leftShoulder = landmarks[11]; const rightShoulder = landmarks[12];
                const leftElbow = landmarks[13];    const rightElbow = landmarks[14];
                const leftWrist = landmarks[15];    const rightWrist = landmarks[16];
                const leftHip = landmarks[23];

                let valA = "-"; let valB = "-"; let isStepPassed = false;
                const cur = ALL_32_STEPS[currentGlobalIdx];
                let angleL = calculateAngle(leftShoulder, leftElbow, leftWrist);
                let angleR = calculateAngle(rightShoulder, rightElbow, rightWrist);

                if (cur.mainIdx === 0) { 
                    if (cur.subIdx === 0) { valA = "胸前就位"; valB = Math.round(Math.abs(leftWrist.x - rightWrist.x)*10); isStepPassed = (leftWrist.y > leftShoulder.y - 0.1); }
                    if (cur.subIdx === 1) { valA = "托高之中"; valB = Math.round(angleL); isStepPassed = (angleL > 100); }
                    if (cur.subIdx === 2) { valA = "高舉伸展"; valB = Math.round(angleL); isStepPassed = (angleL >= 130 && angleR >= 130); }
                    if (cur.subIdx === 3) { valA = "兩側放鬆落"; valB = "重歸身側"; isStepPassed = (leftWrist.y > leftShoulder.y); }
                } else if (cur.mainIdx === 1) { 
                    if (cur.subIdx === 0) { valA = "準備下蹲"; valB = "雙手胸前交"; isStepPassed = true; } 
                    if (cur.subIdx === 1 || cur.subIdx === 2) { valA = Math.round(angleL); valB = Math.round(angleR); isStepPassed = (angleL >= 125); }
                    if (cur.subIdx === 3) { valA = "起立還原"; valB = "中正安舒"; isStepPassed = (leftWrist.y > leftShoulder.y); }
                } else if (cur.mainIdx === 2) { 
                    valA = Math.round(angleL); valB = Math.round(angleR);
                    isStepPassed = (angleL >= 125 || angleR >= 125 || leftWrist.y < leftShoulder.y);
                } else {
                    valA = Math.round(angleL) + "°";
                    valB = Math.round(angleR) + "°";
                    isStepPassed = true; 
                }

                document.getElementById('val-a').innerText = typeof valA === 'number' ? valA + "°" : valA;
                document.getElementById('val-b').innerText = typeof valB === 'number' ? valB + "°" : valB;

                if (isStepPassed) {
                    document.getElementById('val-a').style.color = '#27ae60';
                    document.getElementById('val-b').style.color = '#27ae60';
                    if (!isHolding) { isHolding = true; holdStartTime = Date.now(); }
                    let elapsed = Date.now() - holdStartTime;
                    let percentage = Math.min((elapsed / requiredHoldTime) * 100, 100);
                    document.getElementById('action-progress').style.width = percentage + "%";
                    document.getElementById('target-count').innerText = `${(elapsed/1000).toFixed(1)} / 1.5 秒`;
                    
                    if (Math.floor(elapsed / 150) % 2 === 0) playHoldTickSound(percentage);

                    if (elapsed >= requiredHoldTime) {
                        isHolding = false;
                        document.getElementById('action-progress').style.width = "0%";
                        playPerfectBellSound();
                        if (currentGlobalIdx < 31) {
                            loadStep(currentGlobalIdx + 1);
                        } else {
                            document.getElementById('instruction-text').innerText = "🎉 完美！你已成功順暢通關八段錦全套 32 步復康連擊！全身氣血通暢！";
                            document.getElementById('target-count').innerText = "全功圓滿！";
                        }
                    }
                } else {
                    if (!isHolding) {
                        document.getElementById('val-a').style.color = '#e74c3c';
                        document.getElementById('val-b').style.color = '#e74c3c';
                        document.getElementById('action-progress').style.width = "0%";
                    }
                }
            }
            canvasCtx.restore();
        }

        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        pose.onResults(onResults);
        
        const videoElement = document.getElementById('webcam');
        const camera = new Camera(videoElement, { onFrame: async () => { await pose.send({ image: videoElement }); }, width: 500, height: 390 });
        camera.start();

        window.onload = () => { buildDots(); loadStep(0); };
    </script>
</body>
</html>
